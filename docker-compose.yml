version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: pg-worker
    environment:
      POSTGRES_DB: pg-worker
      POSTGRES_USER: pg-worker
      POSTGRES_PASSWORD: "0706"
    ports:
      - "5445:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pg-worker -d pg-worker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
